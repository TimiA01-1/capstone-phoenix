apiVersion: batch/v1
kind: Job
metadata:
  name: backend-migrate
  namespace: taskapp
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: ghcr.io/ts-a-devops/taskapp-backend:5d6b8fc
          command: ["python3", "-u", "-c", "from app import create_app, db\napp = create_app()\nwith app.app_context():\n    db.create_all()\n    db.session.commit()\n    print('Schema created successfully')"]
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
