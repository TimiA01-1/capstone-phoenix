---
- name: Check if k3s-agent is already installed
  stat:
    path: /usr/local/bin/k3s
  register: k3s_agent_binary

- name: Install k3s agent and join the cluster
  shell: >
    curl -sfL https://get.k3s.io |
    K3S_URL=https://{{ hostvars['control-plane']['private_ip'] }}:6443
    K3S_TOKEN={{ hostvars['control-plane']['node_token'] }}
    sh -
  when: not k3s_agent_binary.stat.exists
